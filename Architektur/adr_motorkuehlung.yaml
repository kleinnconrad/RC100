# ==========================================
# Architectural Decision Record (ADR-007)
# ==========================================
# Thema: Auswahl der Motorkühlung (Thermal Management)

adr_motor_cooling:
  id: "ADR-007"
  title: "Auswahl der aktiven und passiven Motorkühlung für 3S-Speedruns"
  status: "Offen"
  date: "2026-02-24"
  
  context: |
    Das anvisierte Ziel von 100 km/h erfordert den Einsatz eines 4000kV Motors an einem 
    3S LiPo (11.1V), was zu extremen Drehzahlen von ca. 44.400 U/min und einer enormen 
    länger übersetzten Last (64Z/38Z) führt. Unter diesen Bedingungen entsteht im Motor 
    binnen Sekunden massiv nutzlose Abwärme. Ohne angemessene Kühlung droht die 
    Entmagnetisierung des Rotors (Hitzetod) oder das Schmelzen der Isolierung. 
    Daher ist ein kompromissloses thermisches Management-System zwingend erforderlich.

  considered_alternatives:
    - option_id: 1
      name: "Keine Kühlung (Stock Setup)"
      type: "High-Risk"
      evaluation: "Führt bei 3S und der anvisierten Übersetzung unweigerlich zur sofortigen thermischen Zerstörung des Motors."
      
    - option_id: 2
      name: "Nur passiver Kühlkörper (Heatsink ohne Lüfter)"
      type: "Mid-Risk"
      evaluation: "Ein einfacher Aluminium-Kühlkörper vergrößert zwar die Oberfläche, reicht aber ohne aktiven Luftstrom unter der geschlossenen Karosserie bei Speedruns nicht aus, um die massive Stauhitze abzutransportieren."
      
    - option_id: 3
      name: "Passiver Alu-Kühlkörper + Aktiver 40mm High-Speed Lüfter"
      type: "Safe / High-Performance"
      evaluation: "Die Kombination aus wärmeableitendem Aluminium und einem extrem schnell drehenden Lüfter (16.000+ U/min) erzwingt einen starken Airflow direkt am Motorgehäuse und hält die Temperaturen im sicheren Bereich."

  decision: "Passiver 36mm Alu-Kühlkörper kombiniert mit aktivem 40x40mm High-Speed Alu-Lüfter"
  
  cooling_motor:
    component: "Hobbywing QuicRun 3652SL (4000kV)"
    heatsink:
      size: "36mm (Passend für 540er / 3650 / 3652 Baugröße)"
      material: "Aluminium"
      mounting: "Aufsteck-Kühlkörper (Clip-On)"
    fan_active:
      size: "40x40mm High-Speed Lüfter"
      rpm: "16.000 - 20.000 U/min"
      frame_material: "Aluminium (für bessere Wärmeableitung)"
      suggested_brands:
        - "Surpass Hobby (Rocket Serie)"
        - "Yeah Racing (Tornado)"
        - "WTF (Wild Turbo Fan)"

  rationale: |
    Die Entscheidung fällt auf ein duales Kühlsystem (aktiv und passiv). Der 36mm 
    Alu-Aufsteckkühlkörper passt perfekt auf den Hobbywing 3652SL Motor. Der 40mm 
    High-Speed-Lüfter mit Aluminiumrahmen bietet durch Drehzahlen von bis zu 20.000 U/min 
    den nötigen Orkan, um die Hitze wegzublasen. Ein Aluminiumrahmen beim Lüfter 
    verhindert zudem, dass sich dieser bei Stauhitze verformt, und dient als zusätzlicher 
    Mini-Kühlkörper.
    
  consequences:
    - "Stromversorgung: Der Lüfter muss in einen freien Steckplatz des DumboRC-Empfängers (z.B. CH3 oder CH4) gesteckt werden, um Strom vom Regler-BEC zu beziehen."
    - "Kabelmanagement: Durch den extremen Sog des High-Speed-Lüfters müssen alle Kabel (insbesondere Antenne und Servokabel) zwingend mit Kabelbindern gesichert werden, damit sie nicht in die Rotorblätter geraten."
    - "Wärmeleitpaste: Es wird dringend empfohlen, zwischen Motor und Alu-Kühlkörper einen Tropfen PC-Wärmeleitpaste aufzutragen, um den thermischen Übergangswiderstand zu minimieren."
