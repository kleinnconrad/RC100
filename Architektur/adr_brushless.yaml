# ==========================================
# Architectural Decision Record (ADR-002)
# ==========================================
# Thema: Auswahl der Brushless-Antriebseinheit (ESC & Motor) x

adr_brushless_combo:
  id: "ADR-002"
  title: "Auswahl der Brushless-Antriebseinheit (ESC & Motor) für 100 km/h Speedruns"
  status: "Offen"
  date: "2026-02-24"
  
  context: |
    Für das Carten T410R Chassis wird ein Antriebssystem benötigt, das in der Lage ist, 
    das Fahrzeug auf über 100 km/h zu beschleunigen. Dies erfordert den Betrieb an einem 
    3S LiPo-Akku (11.1V Nennspannung) und eine extreme Übersetzung (64Z/38Z). 
    Durch die lange Übersetzung entstehen beim Beschleunigen massive Stromspitzen (Ampere). 
    Ein Standard-Regler (60A bis 80A) würde hier sofort in die thermische Abschaltung gehen 
    oder durchbrennen. Benötigt wird eine Kombination aus hoher Spannungsfestigkeit, 
    ausreichendem Ampere-Puffer (Headroom) und einer Motordrehzahl von ca. 4000kV.

  considered_alternatives:
    - option_id: 1
      name: "Surpass Hobby / GoolRC 120A Combo (Budget / No-Name)"
      type: "Sensorless Brushless"
      price_class: "~ 45 - 60 €"
      evaluation: "Sehr günstig. Das Risiko eines Totalausfalls unter 3S-Volllast ist jedoch extrem hoch. Die angegebenen 120A sind oft Peak-Werte, nicht Dauerstrom. Das integrierte BEC ist meist zu schwach für schnelle Lenkservos bei High-Speed."
      
    - option_id: 2
      name: "Hobbywing Ezrun MAX10 G2 Combo (Mid-to-High-End)"
      type: "Sensored Brushless"
      price_class: "~ 140 - 170 €"
      evaluation: "Hervorragende Qualität, sensorgesteuert für perfektes Anfahrverhalten. Integrierte Temperaturüberwachung. Für reine Speedruns (Vollgas auf der Geraden) ist der Sensor-Vorteil jedoch vernachlässigbar. Der Preis belastet das Projektbudget stark."
      
    - option_id: 3
      name: "Castle Creations Copperhead 10 / 1410 Combo (High-End)"
      type: "Sensored / Data-Logging"
      price_class: "~ 220 - 250 €"
      evaluation: "Absolute Referenzklasse mit integriertem Data-Logging (Telemetrie für Ströme, RPM, Hitze). Massive Leistung. Ist jedoch massiv überdimensioniert (Over-Engineering) und sprengt den Budget-Rahmen für einen 'Make'-Ansatz."

    - option_id: 4
      name: "Hobbywing QuicRun WP 10BL120 G2 + 3652SL 4000kV (Sweet-Spot)"
      type: "Sensorless Brushless"
      price_class: "~ 80 - 95 €"
      evaluation: "Bietet echte 120A Dauerlast. Bewährte Hobbywing-Qualität mit starkem BEC (6.0V/7.4V) für das Savöx-Servo. Die 4000kV liefern an 3S ca. 44.400 U/min – der perfekte mathematische Wert für das 100 km/h-Ziel."

  decision: "Hobbywing QuicRun WP 10BL120 G2 Combo"
  
  rationale: |
    Die Entscheidung fällt auf die Hobbywing QuicRun 120A Combo. Sie bietet das beste 
    Kosten-Nutzen-Verhältnis für diese spezifische Architektur. 120 Ampere Dauerlast 
    bieten das zwingend notwendige thermische und elektrische Sicherheitsnetz für die 
    extreme 64Z/38Z Übersetzung. Da bei Speedruns hauptsächlich im oberen Drehzahlbereich 
    gefahren wird, kann auf ein teures Sensorkabel-Setup (Option 2 & 3) verzichtet werden. 
    Im Gegensatz zu Option 1 (Surpass) garantiert Hobbywing hier reproduzierbare Qualität 
    und ein stabiles BEC, was bei über 100 km/h einen Ausfall der Lenkung verhindert.
    
  consequences:
    - "System ist sensorlos (Sensorless): Beim langsamen Anfahren kann leichtes 'Cogging' (Stottern) auftreten. Dies ist für das Speedrun-Ziel irrelevant."
    - "Zusätzliche Kühlung erforderlich: Der 3652SL Motor muss bei 3S zwingend mit einem passiven Alu-Kühlkörper und einem aktiven 40mm High-Speed-Lüfter nachgerüstet werden (siehe spec_cooling.yaml)."
    - "Kein integriertes Data-Logging: Topspeed und Temperaturen müssen extern gemessen werden (z. B. GPS-Logger und Infrarot-Thermometer)."
