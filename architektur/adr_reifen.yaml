# ==========================================
# Architectural Decision Record (ADR-008)
# ==========================================
# Thema: Auswahl der Bereifung (Tires & Wheels)

adr_tires_selection:
  id: "ADR-008"
  title: "Auswahl der Bereifung (Belted Gummireifen für Asphalt) für 100 km/h Speedruns"
  status: "Entschieden"
  date: "2026-02-25"
  
  context: |
    Bei einer Zielgeschwindigkeit von 100 km/h und den damit verbundenen extremen Drehzahlen 
    der Räder dehnen sich Standard-Gummireifen durch die Fliehkraft massiv in der Mitte aus 
    (der sogenannte "Pizza-Cutter-Effekt" oder "Ballooning"). Das führt zu einem sofortigen 
    Kontrollverlust und oft zum Platzen des Reifens. Gefordert sind fertig verklebte Reifen 
    auf Felgen mit einem 12mm-Sechskant-Mitnehmer (passend für das Carten T410R Chassis), 
    die ihre Form unter extremen Fliehkräften zu 100 % beibehalten und deren Gummimischung 
    der hohen Reibungshitze auf rauem Asphalt standhält.
    Zusätzlich muss die reale Streckenbeschaffenheit (nicht staubfreier Normal-Asphalt vs. 
    sauber präparierte Rennstrecke) bei der Wahl des Reifenprofils (Slick vs. Rillen) 
    beachtet werden.

  considered_alternatives:
    - option_id: 1
      name: "Standard Tourenwagen Gummireifen (Non-Belted)"
      type: "Low-Budget / RTR-Standard"
      evaluation: "Lebensgefährlich für dieses Projekt. Das fehlende Gewebe im Inneren führt bei den angepeilten 44.000 U/min des Motors zu sofortigem Ballooning, Verlust der Bodenhaftung und im schlimmsten Fall zu Reifenplatzern."
      
    - option_id: 2
      name: "Contact RC 1/10 Moosgummi-Reifen (Foams)"
      type: "High-Grip / Lightweight"
      evaluation: "Der klassische Speedrun-Reifen. Dehnt sich physikalisch bedingt überhaupt nicht aus und bietet gigantischen Grip. Ist jedoch extrem anfällig für Straßenschmutz (kleine Steinchen reißen sofort Stücke aus dem Schaumstoff)."
      
    - option_id: 3
      name: "Sweep HANKOOK Tread Belted 32deg (for Carpet)"
      type: "Indoor / Teppich"
      evaluation: "Besitzen zwar das rettende Belted-Gewebe, jedoch ist die 32-Shore Gummimischung viel zu weich für Asphalt. Bei 100 km/h auf der Straße würden diese Reifen extrem überhitzen und extrem schnell verschleißen oder sich auflösen."

    - option_id: 4
      name: "Voll-Slicks Belted (z.B. Sweep EXP Belted Slicks / Matrix Slicks)"
      type: "Premium / Profillos"
      evaluation: "Bieten physikalisch den maximalen Kontakt zur Straße (100 % Gummiauflage) und extreme Laufruhe, da keine Profilblöcke walken können. Sind bei 100 km/h die absolut schnellsten Reifen, ABER erfordern zwingend eine perfekt gekehrte, saubere Piste. Auf staubigen Straßen rutschen sie massiv."

    - option_id: 5
      name: "Sweep HANKOOK Tread Belted tires Pre-glued set Pro-compound 36deg (for Asphalt)"
      type: "High-Performance / Profil-Asphalt"
      evaluation: "Die perfekte Kompromiss-Lösung für normale Straßen. Das eingegossene Gewebeband (Belt) verhindert das Ballooning komplett. Die härtere 36-Shore Mischung ist für Asphalt freigegeben. Das Profil verzeiht leichten Straßenstaub deutlich besser als ein reiner Slick."

  decision: "Sweep HANKOOK Tread Belted tires Pre-glued set Pro-compound 36deg for Asphalt (SR-SSF-36AWPG)"
  
  tires_meta:
    brand: "Sweep Racing"
    model: "HANKOOK Tread Belted tires Pre-glued set Pro-compound 36deg for Asphalt"
    type: "Gewebeverstärkte Gummireifen (Belted)"
    hex_size: "12mm"
    width: "24mm"
    surface: "Asphalt (ungesäubert / Alltag)"

  rationale: |
    Die Entscheidung fällt auf die fertig verklebten Sweep HANKOOK Tread Belted Reifen mit 
    der härteren 36-Shore Asphalt-Mischung. Obwohl ein profilloser Voll-Slick physikalisch 
    die absolute Höchstleistung und maximale Laufruhe bei 100 km/h bietet, ist er im realen 
    Einsatz auf nicht perfekt gekehrten Parkplätzen zu empfindlich gegen feinen Staub (Verlust 
    der Traktion). Das Hankook-Profil kann leichten Schmutz abtransportieren und bietet 
    auf Normal-Asphalt das sicherere und gutmütigere Fahrverhalten. Gleichzeitig garantiert 
    das essenzielle Kevlar-Gewebe (Belt) absolute Sicherheit gegen das lebensgefährliche Ausdehnen.
    
  consequences:
    - "Vorab-Check: Auch ab Werk fertig verklebte Reifen müssen vor dem ersten Run zwingend auf Verarbeitungsfehler an der Klebenaht geprüft werden (kurz an der Reifenflanke ziehen)."
    - "Auswuchten: Da bei 100 km/h kleinste Unwuchten das Fahrwerk destabilisieren, sollten die Räder idealerweise mit einer RC-Reifenwaage und Knetblei ausgewuchtet werden."
    - "Temperaturfenster: Die 36-Shore Mischung ist relativ hart. Um maximalen mechanischen Grip aufzubauen, müssen die Reifen vor dem eigentlichen Speedrun durch 1-2 langsame Runden warmgefahren werden."
