# ==========================================
# Architectural Decision Record (ADR-007)
# ==========================================
# Thema: Auswahl der Karosserie (Aerodynamik / Body Shell)

adr_body_selection:
  id: "ADR-009"
  title: "Auswahl der aerodynamischen Karosserie für 100 km/h Speedruns"
  status: "Offen"
  date: "2026-03-06"
  
  context: |
    Bei einer Zielgeschwindigkeit von 100 km/h (ca. 27,7 m/s) ist die Karosserie kein rein optisches 
    Bauteil mehr, sondern die primäre aerodynamische Schutzschicht. Eine eckige Karosserie fängt 
    Luft unter der Frontschürze ein, was unweigerlich zu einem 'Blow-over' (Rückwärtssalto durch 
    Staudruck) führt. Gleichzeitig darf der Luftwiderstand (cW-Wert) den 3660er Motor nicht 
    unnötig einbremsen. Das Carten T410R Chassis erfordert eine Breite von 190 mm. Zudem ist die 
    Materialstärke kritisch: Dünnes Lexan (< 0.5 mm) verformt sich bei 100 km/h massiv, drückt 
    auf die Reifen und zerstört den Geradeauslauf.

  considered_alternatives:
    - option_id: 1
      name: "Standard Tourenwagen / Bash-Karosserie (z.B. Nissan Skyline, BMW M3)"
      type: "Scale-Optik / High Drag"
      evaluation: "Optisch ansprechend, aber aerodynamisch ein Fallschirm. Die steile Front und hohe Dachlinie sorgen für massiven Luftwiderstand. Hohes Risiko für Blow-overs. Für 100 km/h architektonisch ungeeignet."
      
    - option_id: 2
      name: "ZooRacing Wolverine (190 mm)"
      type: "CFD-optimierte Wettbewerbs-Karosserie"
      evaluation: "Der aktuelle Goldstandard im 1:10 Tourenwagen-Bereich. Im Windkanal und per CFD (Computational Fluid Dynamics) entwickelt. Bietet extrem effiziente Strömungsführung, viel Anpressdruck auf der Vorderachse (verhindert Abheben) und ist als 0.7 mm 'Regular' Version robust genug gegen Verformungen bei Topspeed."
      
    - option_id: 3
      name: "Le Mans Prototype / Gruppe C (z.B. Mon-Tech M-10 oder Delta Plastik LMP)"
      type: "Keilform / Low Drag / Maximum Downforce"
      evaluation: "Die absolute Geheimwaffe für reine Speedruns. Bietet die geringstmögliche Stirnfläche und schneidet wie ein Keil durch die Luft. Nachteil: Sehr flache Bauform vorne kann Konflikte mit den vorderen Stoßdämpferbrücken des Carten T410R verursachen. Erfordert genaues Ausmessen."

    - option_id: 4
      name: "Flacher Supersportler (z.B. Protoform Ford GT oder Corvette C8)"
      type: "Low-Slung Supercar (190 mm)"
      evaluation: "Ein exzellenter Mittelweg zwischen realistischer Auto-Optik und sehr guter Aerodynamik. Flache Schnauze und niedriges Dach verhindern Lift, kommen aber aerodynamisch nicht ganz an die reine Effizienz der ZooRacing Wolverine heran."

  decision: "Noch nicht entschieden (Status: Offen)"
  
  body_meta:
    required_width: "190 mm"
    required_thickness: "Mindestens 0.7 mm (Regular / Standard). Zwingend Finger weg von 'Ultra Light Weight' (ULW)!"

  rationale: |
    Die Entscheidung bleibt vorerst offen, um zu evaluieren, ob der Fokus auf dem absoluten 
    aerodynamischen Optimum (Option 3: LMP), einem perfekten Allrounder mit modernster 
    CFD-Technik (Option 2: ZooRacing Wolverine) oder einer sportlichen Scale-Optik (Option 4) 
    liegen soll. Zwingend ist jedoch der Ausschluss von Option 1, um die Hardware bei 
    100 km/h nicht zu gefährden.
    
  consequences:
    - "Material-Constraint: Egal welche Karosserie gewählt wird, es muss zwingend die Standard-Dicke (meist 0.7 mm bis 1.0 mm) bestellt werden. Leichtbau-Karosserien würden bei dem Winddruck auf die Reifen gepresst werden."
    - "Montage-Constraint: Der Heckflügel muss extrem steif verschraubt werden, da er bei 100 km/h maßgeblich verhindert, dass das Heck ausbricht. Die Karosserielöcher müssen passgenau gerieben werden, um Vibrationen zu minimieren."
    - "Chassis-Vorbereitung: Der Schaumstoff-Bumper an der Front des Carten T410R muss exakt bündig mit der Innenseite der gewählten Karosserie abschließen, damit diese bei High-Speed nicht nach unten durchbiegt."
