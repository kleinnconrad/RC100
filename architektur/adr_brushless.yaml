adr_meta:
  id: "002"
  titel: "Auswahl der Brushless-Motor-Combo (3660 Baugröße)"
  status: "Akzeptiert"
  datum: "2026-03-01"

kontext:
  ziel: "100 km/h mit dem 1/10 Carten T410R an 3S LiPo (11.1V)."
  problem: "Ein Standard-3650er Motor arbeitet bei der nötigen Getriebeübersetzung (Radlast > 20 %) extrem nah am thermischen Limit und riskiert die Zerstörung der Elektronik."

entscheidung:
  beschreibung: "Spezifikation eines 3660er Brushless-Motors (ca. 3700kV - 4000kV) in Kombination mit einem 120A Fahrtenregler (ESC)."
  referenz_implementierung: "Hobbywing Combo WP10BL120G2 mit 3660SL-3700KV-G2."

konsequenzen:
  positiv:
    - "Deutlich höheres Drehmoment durch den 10 mm längeren Rotor."
    - "Massiv erweiterter thermischer Headroom (bis ca. 25.0 % Radlast sicher)."
    - "Mechanisches Limit des Carten-Chassis (Ritzel 44Z = 24.7 % Radlast) kann nun voll ausgereizt werden."
    - "Effizientere Zieldrehzahl (ca. 41.000 U/min) schont die Motor-Kugellager."
  negativ:
    - "Packaging: Der Motor ist 10 mm länger. Weniger Bauraum für ESC und Empfänger im Chassis."
    - "Verschleiß: Höheres Drehmoment belastet Hauptzahnrad und Reifen stärker."
  beachten:
    - "Wellendurchmesser des Motors prüfen! (3.175 mm vs. 5.0 mm erfordert den Kauf passender 48dp Ritzel)."
