# ==========================================
# Kompatibilitäts-Check: Übersetzung & Motorhalter
# ==========================================
# Ziel-Einsatz: 100 km/h Speedrun (Carten T410R)

compatibility_check_gearing:
  status: "PASS"
  fitment_type: "Drop-In-Fit"
  modifications_required: "Keine (Kein Fräsen oder Dremeln notwendig)"

  tooth_sum_theory:
    description: "Der Abstand zwischen Motorwelle und Hauptwelle ist durch die Langlöcher im Aluminium-Motorhalter begrenzt. Die Passgenauigkeit lässt sich bei gleichem Pitch (48dp) über die Summe der Zähne beider Zahnräder berechnen."

  setups_comparison:
    standard_setup:
      spur_gear_teeth: 72
      pinion_gear_teeth: 30
      total_teeth: 102
    speedrun_setup:
      spur_gear_teeth: 64
      pinion_gear_teeth: 38
      total_teeth: 102

  conclusion:
    result: "Da die Zähnesumme (102 Zähne) und damit der physische Gesamtdurchmesser beider Setups exakt identisch ist, bleibt der Motor sicher im Verstellbereich der Langlöcher."
    gear_mesh_setup: "Es gibt ausreichend Spielraum, um das Zahnflankenspiel (Gear Mesh) mit dem Papier-Trick perfekt einzustellen."

# ==========================================
# 🛒 PRAXIS-TIPPS FÜR DEN TEILEKAUF
# ==========================================
purchasing_and_installation_tips:
  spur_gear:
    teeth: 64
    pitch: "48dp"
    mounting_requirement: "Muss Standard-Bohrungen in der Mitte haben (meist 3 oder 4 Löcher im Kreis), um auf den Carten-Aluminium-Mitnehmer geschraubt werden zu können."
    suggested_brands: 
      - "Arrowmax"
      - "Kimbrough"

  pinion_gear:
    teeth: 38
    pitch: "48dp"
    clearance_warning: "Ein 38Z Ritzel ist physisch massiv. Beim Einbau zwingend prüfen, dass das große Ritzel nicht an der rotierenden Aluminium-Kardanwelle in der Mitte schleift. Ein minimaler Sicherheitsabstand muss zwingend erhalten bleiben."
