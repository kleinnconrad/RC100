  lackier_prozess:
    grundregel: Lexan-Karosserien werden immer von INNEN lackiert! Die äußere Schutzfolie
      bleibt bis ganz zum Schluss auf dem Auto.
    vorbereitung: Die Innenseite zwingend mit lauwarmem Wasser und Spülmittel auswaschen,
      um Trennfett aus der Tiefzieh-Produktion zu entfernen. Danach Fenster mit den
      beiliegenden Maskierfolien abkleben.
    auftrag: In 3 bis 4 sehr feinen, dünnen Schichten sprühen ('Nebel'). Zwischen
      den Schichten 10-15 Minuten ablüften lassen. Niemals versuchen, beim ersten
      Durchgang deckend zu lackieren (Gefahr von Tropfen/Nasen).
