  aerodynamic_features:
    front: Tief gezogene Nase und sanfter Haubenwinkel reduzieren den Staudruck und
      verhindern Lift.
    roofline: Flach abfallendes Dach leitet die Luft laminar und störungsfrei zum
      Heckflügel.
    rear_wing: Inkludierter High-Downforce Flügel sorgt für zwingend benötigte Heckstabilität
      bei High-Speed.
  preparation_and_painting:
    reinigung: Die Innenseite der Karosserie vor dem Lackieren zwingend mit Spülmittel
      auswaschen, um Trennmittelreste aus der Produktion zu entfernen.
    lack_typ: Ausschließlich Polycarbonat-Spray (z.B. Tamiya PS-Farben) verwenden.
      Von innen in mehreren dünnen Schichten lackieren.
    schutzfolie: Die äußere Overspray-Schutzfolie erst nach dem kompletten Lackieren
      und Bohren der Löcher abziehen.
  mounting_instructions:
    karosserieloecher: Löcher nicht stechen, sondern mit einem speziellen Karosseriebohrer
      (Reamer) bohren, um Risse im Lexan zu vermeiden.
    bumper_support: Der Front-Schaumstoffbumper des Chassis muss den vorderen Karosserieüberhang
      mechanisch abstützen.
    radkaesten: Radkästen mit einer gebogenen Lexanschere ausschneiden und Kanten
      mit feinem Schleifpapier glätten, um Einreißen bei Vibrationen zu verhindern.
