    torque_6v: 9.0 kg-cm
    speed_6v: 0.09 sec / 60°
    return_to_center_accuracy: Sehr hoch (Kritisch für stabilen Geradeauslauf bei
      100 km/h)
  mandatory_upgrades:
    part: Aluminium-Servohorn (Zwingend 25T Verzahnung für Savöx kaufen!)
    reason: Das Baukasten-Plastikhorn verbiegt sich (Flex) bei 100 km/h unter dem
      extremen Winddruck auf die Vorderräder. Das Alu-Horn garantiert eine absolut
      steife, spielfreie Lenkverbindung.
    installation: Die Schraube, die das Horn auf dem Servo hält, zwingend mit Schraubensicherungslack
      (z. B. Loctite mittelfest) fixieren, damit sie sich durch Vibrationen nicht
      löst.
  transmitter_setup:
    dual_rate: Für den 100 km/h Run muss an der Fernsteuerung zwingend das 'Dual Rate'
      (D/R) oder der Lenkausschlag (EPA) auf ca. 30-40% reduziert werden. Minimale
      Lenkbewegungen reichen bei Top-Speed völlig aus. Voller Ausschlag führt zum
      sofortigen Überschlag.
