  cooling_best_practices:
    thermal_paste:
      issue: Wärmeübertragung
      action: Ein winziger Tropfen PC-Wärmeleitpaste zwischen Motorgehäuse und Alu-Kühlkörper
        verbessert die Hitzeübertragung massiv.
    cable_management:
      issue: Sog des High-Speed-Lüfters
      action: Alle Sensorkabel und Antennen zwingend mit Kabelbindern fixieren, damit
        sie nicht vom starken Luftzug in die Rotorblätter gesaugt werden.
    body_airflow:
      issue: Hitzestau unter der Karosserie
      action: Für Speedruns zwingend Lüftungslöcher in die Frontscheibe oder die hinteren
        Seitenfenster schneiden, damit ein kühlender Durchzug (Airflow) entsteht.
