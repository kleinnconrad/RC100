    software: RC Gears / Ruddog App (oder baugleiche SkyRC App)
    funktionen: Top-Speed Messung, 0-100 km/h Zeitmessung, Track-Logging
  mounting_and_setup:
    positionierung: 'Zwingend an einer Stelle montieren, die freie Sicht zum Himmel
      hat. Karbonbauteile (wie das Upper-Deck des Carten) schirmen das Satellitensignal
      ab! Bester Montageort: Auf dem vorderen Schaumstoff-Rammschutz (Bumper).'
    fixierung: Das Modul bei Speedruns zwingend mit Klettverschluss UND einem zusätzlichen
      Kabelbinder oder Tape sichern. Die G-Kräfte bei einem Crash sind enorm.
    bedienung: Das Modul blinkt während der Satellitensuche. Erst losfahren, wenn
      das GPS-Signal (meist durch durchgehendes Leuchten) als 'Locked' bestätigt ist,
      sonst fehlen die ersten Meter in der Messung.
