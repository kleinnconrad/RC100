Differentiale:
  differential_meta:
    type: Öldruck-Kegeldifferential (Metal Gear)
    mechanical_load_capacity: '> 100 km/h (ca. 8.300 U/min Achsdrehzahl)'
  material_and_construction:
    gears_ring_and_bevel: Sintermetall / Stahl
    diff_outdrives_cup_joints: Gehärteter Stahl
    diff_case_cup: Faserverstärkter Verbundkunststoff (Composite)
  mandatory_modifications:
    perfect_shimming:
      issue: Spielfreiheit
      description: Die inneren Metallzahnräder müssen beim Zusammenbau mit hauchdünnen
        Passscheiben (Shims) absolut spielfrei eingestellt werden. Nur so wird verhindert,
        dass die Zähne unter dem extremen Drehmoment des 3S-Motors überspringen oder
        abreißen.
    reinforced_sealing:
      issue: O-Ring Abdichtung
      description: Bei 8.300 U/min erzeugt das Öl im Inneren einen massiven Fliehkraftdruck
        nach außen. Die Gummi-O-Ringe müssen mit zähem Spezialfett (z. B. 'Green Slime')
        abgedichtet werden, damit das Differential nicht trockenläuft.
    oil_viscosity:
      issue: Sperrwirkung & Geradeauslauf
      description: Das Baukasten-Öl ist zu weich und führt bei Speedruns zu unkontrollierbarem
        Ausbrechen, wenn ein Rad minimal Grip verliert. Es muss extrem zähes Silikonöl
        verwendet werden, um das Auto auf einen sturen Geradeauslauf zu zwingen.
      setup_recommendation:
        front_axle: ca. 100.000 cSt (oder ein komplett starrer Spool/Starrachse)
        rear_axle: ca. 10.000 cSt
Kardanwelle Und Joints:
  center_shaft_meta:
    component: Zentrale Antriebswelle (Center Shaft)
  material_and_suitability:
    driveshaft:
      component: Kardanwelle (Welle)
      material: Aluminium (eloxiert), hohl oder massiv (je nach Batch)
      suitability_100kmh_3s: JA. Aluminium ist hier besser als Stahl, da die geringere
        rotierende Masse bei ca. 26.000 U/min weniger Vibrationen erzeugt.
    joint_cups:
      component: Verbindungsstücke (Diff-Inputs)
      material: Stahl (Gehärtet)
      suitability_100kmh_3s: JA. Die Aufnahmen am Differentialeingang sind aus Stahl
        und halten dem Drehmoment des 3S-Antriebs stand.
    rpm_load:
      component: Drehzahl-Belastung
      specification: Welle rotiert mit ca. 26.000 U/min
      suitability_100kmh_3s: Kritisch, aber für das Baukasten-Teil machbar, solange
        keine Unwucht vorliegt.
  mandatory_durability_measures:
    centering_floating_problem:
      issue: Zentrierung (Das 'Floating' Problem)
      description: Die Welle darf in den Bechern (Cups) nicht hin und her schlagen
        ('chatter').
      action: Zwingend kleine O-Ringe oder Schaumstoff-Plättchen (oft im Baukasten
        enthalten oder aus alten Dämpfer-Gummis geschnitten) in die Becher legen,
        bevor die Welle eingesetzt wird. Die Welle muss 'schwimmend', aber spielfrei
        zwischen den Diffs sitzen.
    joint_lubrication:
      issue: Schmierung der Gelenke
      description: Die Enden der Kardanwelle (Dogbones), die in den Stahlbechern laufen,
        sind Metall auf Metall. Bei 3S-Power entsteht hier massiver Verschleiß ('Einschlagen').
      action: Diese Kontaktpunkte mit zähem Molybdän-Fett (schwarz) oder speziellem
        'Joint Grease' schmieren, um die Reibung zu minimieren.
    runout_check:
      issue: Prüfung auf Rundlauf
      description: Roll die Welle vor dem Einbau über eine Glasplatte (oder einen
        Spiegel).
      action: Wenn sie auch nur minimal 'eiert' (verbogen ist), wird sie bei 26.000
        U/min das ganze Chassis in zerstörerische Vibrationen versetzen. In diesem
        Fall muss sie sofort ersetzt werden.
Reifen:
  reifen_meta:
    brand: Sweep Racing
    model: HANKOOK Tread Belted tires Pre-glued set Pro-compound 36deg for Asphalt
    part_number: SR-SSF-36AWPG
    type: Gewebeverstärkte Gummireifen (Belted), fertig verklebt
  physical_specifications:
    width: 24mm (Standard 1:10 Tourenwagen)
    hex_size: 12mm
    compound: 36 Shore (Hart / optimiert für Asphalt)
    tread_pattern: Hankook lizenziertes Profil (Rillen)
    wheel_design: 12-Speichen-Felge (Weiß)
    surface_recommendation: Asphalt (Alltag / ungesäubert)
  performance_features:
    anti_ballooning: Ein eingegossener Kevlar-/Aramid-Gürtel verhindert das lebensgefährliche
      Ausdehnen (Pizza-Cutter-Effekt) bei den angepeilten 44.000 U/min (100 km/h).
    pre_glued: Ab Werk industriell verklebt, was das Risiko minimiert, dass sich der
      Reifen bei extremen Fliehkräften von der Felge löst.
  architecture_rationale:
    why_not_slicks: "Ein profilloser Voll-Slick (z. B. Sweep EXP Belted Slicks) bietet\
      \ theoretisch die absolute \nHöchstleistung, maximale Kontaktfläche (100 % Gummi)\
      \ und extreme Laufruhe bei 100 km/h. \nDieser Vorteil gilt jedoch nur auf perfekt\
      \ präparierten, staubfreien Rennstrecken. \nIm realen Einsatz auf normalen Straßen\
      \ oder Parkplätzen sammeln Slicks den feinen Staub auf \nund verlieren massiv\
      \ an Traktion. Das gewählte Hankook-Profil mit seinen Rillen kann diesen \n\
      Straßenschmutz abtransportieren und bietet auf ungesäubertem Asphalt ein deutlich\
      \ sichereres, \ngutmütigeres Fahrverhalten bei voller Anti-Ballooning-Sicherheit.\n"
