    part: Backing-Color (Hinterlegungsfarbe) - z.B. Tamiya PS-12 (Silber) oder PS-1
      (Weiß)
    reason: 'KRITISCH: PS-15 Metallic Red ist nicht blickdicht. Wenn die 3-4 Schichten
      Rot trocken sind, MUSS zwingend eine Schicht Silber oder Weiß als Abschluss
      darüber gesprüht werden. Das reflektiert das Licht durch das Rot nach außen
      und macht die Karosserie blickdicht und leuchtend.'
Reifen:
