name: Build Specs and Shopping List

on:
  push:
    branches:
      - main
    paths:
      - '**/spec_*.yaml' # Läuft an, sobald du EGAL WELCHE spec_ änderst

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Run Merge Script
        run: python merge_specs.py

      - name: Run Shopping List Generator
        run: python generate_shopping_list.py

      - name: Commit and Push all changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fügt beide generierten Dateien hinzu
          git add full_spec.yaml
          git add projekt/kosten/shopping_list.md
          
          git commit -m "chore(docs): auto-update full spec and shopping list [skip ci]" || echo "Keine Änderungen zu committen."
          git push