name: Build Specs, Docs and Shopping List

on:
  push:
    branches:
      - main
    paths:
      - '**/spec_*.yaml' # Reagiert auf jede Änderung an einer Spezifikation

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install pyyaml

      # Schritt 1: YAMLs zusammenführen
      - name: Run Merge Script
        run: python merge_specs.py

      # Schritt 2: Markdown-Doku generieren (DAS HAT GEFEHLT!)
      - name: Run Markdown Generator
        run: python yaml_to_md.py

      # Schritt 3: Einkaufsliste generieren
      - name: Run Shopping List Generator
        run: python generate_shopping_list.py

      # Schritt 4: Alles zusammen committen
      - name: Commit and Push all changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Das -A (All) zwingt Git, jede noch so kleine Änderung im Projekt aufzunehmen!
          git add -A
          
          git commit -m "chore(docs): auto-update specs, docs and shopping list [skip ci]" || echo "Keine Änderungen zu committen."
          git push