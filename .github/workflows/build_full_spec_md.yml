name: Generate Full Spec Markdown

on:
  workflow_run:
    # Dieser Name muss EXAKT mit dem 'name:' Feld in build_spec.yml übereinstimmen
    workflows: ["Generate Full Spec"] 
    types:
      - completed
  workflow_dispatch:

jobs:
  build-markdown:
    runs-on: ubuntu-latest
    # Wir prüfen explizit auf Erfolg der Vor-Action
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: ⚙️ Run YAML to Markdown Script
        run: python yaml_to_md.py

      - name: 🚀 Commit and Push full_spec.md
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [[ -f "full_spec.md" ]] && [[ -n "$(git status --porcelain full_spec.md)" ]]; then
            git add full_spec.md
            git commit -m "docs(spec): auto-generate full_spec.md [skip ci]"
            git push
          else
            echo "Keine Änderungen an der full_spec.md erkannt oder Datei fehlt."
          fi
