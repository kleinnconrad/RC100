name: Generate Shopping List

on:
  push:
    branches:
      - main
    paths:
      - 'full_spec.yaml'

jobs:
  build-shopping-list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install pyyaml

      - name: Run Shopping List Generator
        run: python generate_shopping_list.py

      - name: Commit and Push shopping_list.md
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # NEU: Der Git-Befehl zielt jetzt auf den neuen Ordner ab
          git add projekt/kosten/shopping_list.md
          git commit -m "chore(docs): auto-update shopping_list.md [skip ci]" || echo "Keine Änderungen zu committen."
          git push